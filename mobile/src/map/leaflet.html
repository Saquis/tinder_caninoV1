<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    .dog-marker {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 18px;
      cursor: pointer;
    }

    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 4px;
    }
    .custom-popup .leaflet-popup-content {
      margin: 8px 12px;
      font-size: 14px;
      min-width: 150px;
    }
    .popup-name {
      font-weight: 800; font-size: 16px; color: #333;
    }
    .popup-raza {
      color: #666; font-size: 13px; margin-top: 2px;
    }
    .popup-row {
      display: flex; gap: 8px; margin-top: 6px;
    }
    .popup-badge {
      background: #C4622D; color: white;
      border-radius: 8px; padding: 2px 8px; font-size: 11px; font-weight: 700;
    }
    .popup-dist {
      color: #888; font-size: 11px;
    }
    .user-marker {
      width: 20px; height: 20px; border-radius: 50%;
      background: #4285F4; border: 3px solid white;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.3);
    }
    .user-pulse {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(66,133,244,0.15);
      position: absolute; top: -10px; left: -10px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const PROPOSITO_COLORS = {
      jugar: '#4CAF50', pasear: '#2196F3',
      reproduccion: '#E91E63', todo: '#FF9800'
    };
    const PROPOSITO_LABELS = {
      jugar: 'Jugar', pasear: 'Pasear',
      reproduccion: 'Reproducción', todo: 'Todo'
    };
    const PROPOSITO_ICONS = {
      jugar: '🟢', pasear: '🔵',
      reproduccion: '🩷', todo: '🟠'
    };

    let map, userMarker, dogMarkers = [];

    function initMap(lat, lng, perros) {
      map = L.map('map', {
        center: [lat, lng],
        zoom: 12,
        zoomControl: false,
        attributionControl: false
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
      }).addTo(map);

      // Ubicación del usuario
      const userIcon = L.divIcon({
        className: '',
        html: '<div class="user-marker"><div class="user-pulse"></div></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
      userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);

      // Perros
      addDogs(perros);
    }

    function addDogs(perros) {
      // Limpiar marcadores viejos
      dogMarkers.forEach(m => map.removeLayer(m));
      dogMarkers = [];

      perros.forEach(p => {
        if (!p.latitud || !p.longitud) return;
        const color = PROPOSITO_COLORS[p.proposito] || '#FF9800';
        const label = PROPOSITO_LABELS[p.proposito] || 'Todo';
        const icon = PROPOSITO_ICONS[p.proposito] || '🟠';

        const markerHtml = '<div class="dog-marker" style="background:' + color + '">🐾</div>';
        const markerIcon = L.divIcon({
          className: '',
          html: markerHtml,
          iconSize: [36, 36],
          iconAnchor: [18, 18]
        });

        const km = p.distancia ? p.distancia + ' km' : '';
        const popupContent = '<div>' +
          '<div class="popup-name">' + (p.nombre || 'Sin nombre') + '</div>' +
          '<div class="popup-raza">' + (p.raza || 'Mestizo') + '</div>' +
          '<div class="popup-row">' +
            '<span class="popup-badge">' + icon + ' ' + label + '</span>' +
            '<span class="popup-dist">' + km + '</span>' +
          '</div>' +
        '</div>';

        const marker = L.marker([parseFloat(p.latitud), parseFloat(p.longitud)], {
          icon: markerIcon
        }).addTo(map);

        marker.bindPopup(popupContent, { className: 'custom-popup', closeButton: false });

        marker.on('click', function() {
          // Notificar a React Native
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({
              type: 'dogSelected',
              dog: p
            }));
          }
        });

        marker.on('popupopen', function() {
          if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({
              type: 'dogSelected',
              dog: p
            }));
          }
        });

        dogMarkers.push(marker);
      });
    }

    function centerMap(lat, lng) {
      if (map) map.setView([lat, lng], 14, { animate: true });
    }

    // Escuchar mensajes desde React Native
    document.addEventListener('message', function(e) {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'centerMap') {
          centerMap(data.lat, data.lng);
        } else if (data.type === 'updateDogs') {
          addDogs(data.perros || []);
        }
      } catch(err) {}
    });

    // También window.onmessage para Android
    window.onmessage = function(e) {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'centerMap') {
          centerMap(data.lat, data.lng);
        } else if (data.type === 'updateDogs') {
          addDogs(data.perros || []);
        }
      } catch(err) {}
    };

    // Exponer global para RN
    window.MapBridge = {
      initMap: initMap,
      addDogs: addDogs,
      centerMap: centerMap
    };
  </script>
</body>
</html>
